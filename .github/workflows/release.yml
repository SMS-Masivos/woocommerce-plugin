name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Build plugin zip
        run: |
          mkdir -p sms-masivos
          rsync -a \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='.gitignore' \
            --exclude='.gitlab-ci.yml' \
            --exclude='context-*.md' \
            --exclude='README.md' \
            --exclude='.DS_Store' \
            ./ sms-masivos/
          zip -r sms-masivos-${{ steps.version.outputs.VERSION }}.zip sms-masivos/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: sms-masivos-${{ steps.version.outputs.VERSION }}.zip
          generate_release_notes: true
